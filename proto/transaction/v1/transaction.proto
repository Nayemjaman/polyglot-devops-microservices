syntax = "proto3";

package transaction.v1;

option go_package = "github.com/nayem/polyglot-devops-microservices/proto/gen/go/transaction/v1;transactionv1";

service TransactionService {
  rpc GetUserMonthlySummary(GetUserMonthlySummaryRequest) returns (GetUserMonthlySummaryResponse);
  rpc GetUserCategorySpending(GetUserCategorySpendingRequest) returns (GetUserCategorySpendingResponse);
  rpc GetUserTransactionsForReport(GetUserTransactionsForReportRequest) returns (GetUserTransactionsForReportResponse);
}

message GetUserMonthlySummaryRequest {
  string user_id = 1;
  int32 year = 2;
  int32 month = 3;
}

message GetUserMonthlySummaryResponse {
  string total_income = 1;
  string total_expense = 2;
  string balance = 3;
  string currency_code = 4;
}

message GetUserCategorySpendingRequest {
  string user_id = 1;
  string category_id = 2;
  int32 year = 3;
  int32 month = 4;
}

message GetUserCategorySpendingResponse {
  string category_id = 1;
  string category_name = 2;
  string total_spent = 3;
  string currency_code = 4;
}

message GetUserTransactionsForReportRequest {
  string user_id = 1;
  int32 year = 2;
  int32 month = 3;
}

message ReportTransaction {
  string id = 1;
  string wallet_id = 2;
  string wallet_name = 3;
  string category_id = 4;
  string category_name = 5;
  string type = 6;
  string amount = 7;
  string currency_code = 8;
  string transaction_date = 9;
}

message GetUserTransactionsForReportResponse {
  repeated ReportTransaction transactions = 1;
}
