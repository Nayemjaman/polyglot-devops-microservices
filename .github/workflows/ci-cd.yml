name: Polyglot Microservices CI/CD

on:
  pull_request:
    branches:
      - main
      - staging
      - prod
  push:
    branches:
      - staging
      - prod
  workflow_dispatch:
    inputs:
      build_all:
        description: Build and push every application image
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  branch-policy:
    name: Branch policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require prod commits to come from staging
        if: github.event_name == 'push' && github.ref == 'refs/heads/prod'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin staging
          if ! git merge-base --is-ancestor HEAD origin/staging; then
            echo "Prod can only deploy commits that already exist in the staging branch."
            echo "Merge or fast-forward staging first, then promote that staging commit to prod."
            exit 1
          fi

  frontend-ci:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    needs: branch-policy
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  python-ci:
    name: Python CI - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: branch-policy
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            path: services/auth-service
            lint_paths: core users manage.py
          - service: transaction-service
            path: services/transaction-service
            lint_paths: app tests
          - service: report-service
            path: services/report-service
            lint_paths: app tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ci_db
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_user -d ci_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ${{ matrix.path }}
    env:
      POSTGRES_DB: ci_db
      POSTGRES_USER: ci_user
      POSTGRES_PASSWORD: ci_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      APP_NAME: ${{ matrix.service }}
      APP_ENV: test
      HOST: 127.0.0.1
      PORT: "8000"
      AUTH_SERVICE_URL: http://127.0.0.1:8000
      HTTP_TIMEOUT_SECONDS: "5"
      DATABASE_URL: postgresql+asyncpg://ci_user:ci_password@localhost:5432/ci_db
      DATABASE_ECHO: "false"
      DATABASE_POOL_SIZE: "5"
      DATABASE_MAX_OVERFLOW: "10"
      STORAGE_ENDPOINT_URL: http://127.0.0.1:9000
      STORAGE_REGION: us-east-1
      STORAGE_ACCESS_KEY: ci-access-key
      STORAGE_SECRET_KEY: ci-secret-key
      STORAGE_BUCKET_NAME: ci-bucket
      STORAGE_PUBLIC_BASE_URL: http://127.0.0.1:9000/ci-bucket
      STORAGE_PATH_PREFIX: transaction-attachments
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.path }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt ruff flake8

      - name: Lint
        run: |
          flake8 ${{ matrix.lint_paths }} --count --select=E9,F63,F7,F82 --extend-ignore=F821 --show-source --statistics
          if [ -f pyproject.toml ]; then
            ruff check ${{ matrix.lint_paths }} --ignore F821
          else
            python -m compileall ${{ matrix.lint_paths }}
          fi

      - name: Test
        run: |
          if [ -f manage.py ]; then
            python manage.py check
            python manage.py test
          else
            pytest
          fi

  budget-ci:
    name: Budget service CI
    runs-on: ubuntu-latest
    needs: branch-policy
    defaults:
      run:
        working-directory: services/budget-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: services/budget-service/go.sum

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    needs: branch-policy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan repository
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    needs: branch-policy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run hooks
        uses: pre-commit/action@v3.0.1

  sonar:
    name: SonarQube code quality
    runs-on: ubuntu-latest
    needs: branch-policy
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: Skip SonarQube scan
        if: env.SONAR_TOKEN == ''
        run: echo "SONAR_TOKEN is not configured. Skipping SonarQube scan."

  docker-dry-run:
    name: Docker dry run - ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/staging')
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            path: frontend
          - name: auth-service
            path: services/auth-service
          - name: transaction-service
            path: services/transaction-service
          - name: budget-service
            path: services/budget-service
          - name: report-service
            path: services/report-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image without pushing
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          file: ${{ matrix.path }}/Dockerfile
          push: false
          load: true
          tags: local/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=dry-run-${{ matrix.name }}
          cache-to: type=gha,scope=dry-run-${{ matrix.name }},mode=max

      - name: Scan dry-run image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: local/${{ matrix.name }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/prod') || (github.event_name == 'workflow_dispatch' && inputs.build_all)
    needs:
      - frontend-ci
      - python-ci
      - budget-ci
      - security-scan
      - pre-commit
      - sonar
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changed-service matrix
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          services='[]'

          add_service() {
            local name="$1"
            local path="$2"
            services="$(jq -c --arg name "$name" --arg path "$path" '. + [{name: $name, path: $path}]' <<< "$services")"
          }

          add_all_services() {
            add_if_missing "frontend" "frontend"
            add_if_missing "auth-service" "services/auth-service"
            add_if_missing "transaction-service" "services/transaction-service"
            add_if_missing "budget-service" "services/budget-service"
            add_if_missing "report-service" "services/report-service"
          }

          add_if_missing() {
            local name="$1"
            local path="$2"
            if ! jq -e --arg name "$name" '.[] | select(.name == $name)' <<< "$services" >/dev/null; then
              add_service "$name" "$path"
            fi
          }

          if [ "${{ github.event_name }}" = "push" ]; then
            before="${{ github.event.before }}"
            if [ -z "$before" ] || [[ "$before" =~ ^0+$ ]]; then
              before="$(git rev-parse HEAD^)"
            fi

            changed_files="$(git diff --name-only "$before" "${{ github.sha }}")"
            echo "$changed_files"

            while IFS= read -r file; do
              [ -n "$file" ] || continue

              case "$file" in
                frontend/*)
                  add_if_missing "frontend" "frontend"
                  ;;
                services/auth-service/*)
                  add_if_missing "auth-service" "services/auth-service"
                  add_if_missing "transaction-service" "services/transaction-service"
                  add_if_missing "budget-service" "services/budget-service"
                  add_if_missing "report-service" "services/report-service"
                  ;;
                services/transaction-service/*)
                  add_if_missing "transaction-service" "services/transaction-service"
                  ;;
                services/budget-service/*)
                  add_if_missing "budget-service" "services/budget-service"
                  ;;
                services/report-service/*)
                  add_if_missing "report-service" "services/report-service"
                  ;;
                proto/budget/*)
                  add_if_missing "budget-service" "services/budget-service"
                  ;;
                proto/transaction/*)
                  add_if_missing "transaction-service" "services/transaction-service"
                  add_if_missing "budget-service" "services/budget-service"
                  ;;
                infra/*|.github/workflows/ci-cd.yml)
                  add_all_services
                  ;;
              esac
            done <<< "$changed_files"

            matrix="$(jq -c --argjson include "$services" '{include: $include}' <<< '{}')"
            if [ "$services" = "[]" ]; then
              echo 'has_changes=false' >> "$GITHUB_OUTPUT"
            else
              echo 'has_changes=true' >> "$GITHUB_OUTPUT"
            fi
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.build_all }}" = "true" ]; then
            add_all_services

            matrix="$(jq -c --argjson include "$services" '{include: $include}' <<< '{}')"
            echo 'has_changes=true' >> "$GITHUB_OUTPUT"
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          matrix="$(jq -c --argjson include "$services" '{include: $include}' <<< '{}')"

          if [ "$services" = "[]" ]; then
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          else
            echo 'has_changes=true' >> "$GITHUB_OUTPUT"
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          fi

  docker-build-push:
    name: Build and push - ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.has_changes == 'true'
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER_NAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          file: ${{ matrix.path }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USER_NAME }}/polyglot-devops-microservices:${{ matrix.name }}-${{ github.sha }}
            ${{ secrets.DOCKERHUB_USER_NAME }}/polyglot-devops-microservices:${{ matrix.name }}-prod
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: Scan pushed image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USER_NAME }}/polyglot-devops-microservices:${{ matrix.name }}-${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.has_changes == 'true' && (github.event_name == 'push' && github.ref == 'refs/heads/prod' || github.event_name == 'workflow_dispatch' && inputs.build_all)
    needs:
      - detect-changes
      - docker-build-push
    environment: production
    steps:
      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.PROD_EC2_HOST }}" || { echo "PROD_EC2_HOST is empty"; exit 1; }
          test -n "${{ secrets.PROD_EC2_USER }}" || { echo "PROD_EC2_USER is empty"; exit 1; }
          test -n "${{ secrets.PROD_EC2_SSH_KEY }}" || { echo "PROD_EC2_SSH_KEY is empty"; exit 1; }
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROD_EC2_SSH_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keygen -y -f ~/.ssh/prod_key >/dev/null || { echo "PROD_EC2_SSH_KEY is not a valid private key"; exit 1; }
          ssh-keyscan -T 30 -H "${{ secrets.PROD_EC2_HOST }}" >> ~/.ssh/known_hosts || { echo "Cannot reach EC2 SSH host on port 22"; exit 1; }

      - name: Test SSH connection
        shell: bash
        run: |
          set -euo pipefail
          ssh -vvv -o BatchMode=yes -o ConnectTimeout=30 -i ~/.ssh/prod_key \
            "${{ secrets.PROD_EC2_USER }}@${{ secrets.PROD_EC2_HOST }}" \
            'echo "ssh ok"; docker --version; docker compose version; test -d "${{ secrets.PROD_DEPLOY_PATH }}"'

      - name: Write deployment matrix
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' '${{ needs.detect-changes.outputs.matrix }}' > deploy-matrix.json

      - name: Copy deployment matrix
        shell: bash
        run: |
          set -euo pipefail
          scp -i ~/.ssh/prod_key deploy-matrix.json \
            "${{ secrets.PROD_EC2_USER }}@${{ secrets.PROD_EC2_HOST }}:/tmp/polyglot-deploy-matrix.json"

      - name: Deploy changed services
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/prod_key "${{ secrets.PROD_EC2_USER }}@${{ secrets.PROD_EC2_HOST }}" <<'EOF'
            set -eu
            cd "${{ secrets.PROD_DEPLOY_PATH }}"
            git fetch origin prod
            git checkout prod
            git pull --ff-only origin prod
            cd infra
            printf '%s\n' "${{ secrets.DOCKERHUB_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USER_NAME }}" --password-stdin
            IMAGE_SHA="${{ github.sha }}" sh deploy-changed-services.sh /tmp/polyglot-deploy-matrix.json
          EOF
