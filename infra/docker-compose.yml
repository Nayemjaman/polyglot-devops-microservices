name: polyglot-devops-microservices

x-postgres-common: &postgres-common
  image: postgres:16-alpine
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 10s
  networks:
    - backend

x-pgbouncer-common: &pgbouncer-common
  image: edoburu/pgbouncer:v1.25.1-p0
  restart: unless-stopped
  networks:
    - backend

services:
  auth-postgres:
    <<: *postgres-common
    container_name: auth-postgres
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_service_db}
      POSTGRES_USER: ${AUTH_DB_USER:-auth_service_user}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-auth_service_password}
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data

  auth-pgbouncer:
    <<: *pgbouncer-common
    container_name: auth-pgbouncer
    depends_on:
      auth-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${AUTH_DB_USER:-auth_service_user}:${AUTH_DB_PASSWORD:-auth_service_password}@auth-postgres:5432/${AUTH_DB_NAME:-auth_service_db}
      LISTEN_PORT: 6432
      AUTH_TYPE: plain
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 5
      SERVER_RESET_QUERY: DISCARD ALL
      ADMIN_USERS: ${AUTH_DB_USER:-auth_service_user}
      STATS_USERS: ${AUTH_DB_USER:-auth_service_user}
    ports:
      - "6432:6432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${AUTH_DB_USER:-auth_service_user} -d ${AUTH_DB_NAME:-auth_service_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  auth-service:
    build:
      context: ../services/auth-service
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      auth-pgbouncer:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: ${AUTH_DJANGO_DEBUG:-False}
      DJANGO_SECRET_KEY: ${AUTH_DJANGO_SECRET_KEY:-dev-auth-secret-key-change-me-at-least-32-characters}
      DJANGO_ALLOWED_HOSTS: ${AUTH_DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,auth-service}
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_service_db}
      POSTGRES_USER: ${AUTH_DB_USER:-auth_service_user}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-auth_service_password}
      POSTGRES_HOST: auth-pgbouncer
      POSTGRES_PORT: 6432
    command:
      - gunicorn
      - core.asgi:application
      - -k
      - uvicorn.workers.UvicornWorker
      - --bind
      - 0.0.0.0:8000
      - --workers
      - "4"
    ports:
      - "8000:8000"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8000), 3); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  budget-postgres:
    <<: *postgres-common
    container_name: budget-postgres
    environment:
      POSTGRES_DB: ${BUDGET_DB_NAME:-budget_service_db}
      POSTGRES_USER: ${BUDGET_DB_USER:-budget_service_user}
      POSTGRES_PASSWORD: ${BUDGET_DB_PASSWORD:-budget_service_password}
    volumes:
      - budget-postgres-data:/var/lib/postgresql/data

  budget-pgbouncer:
    <<: *pgbouncer-common
    container_name: budget-pgbouncer
    depends_on:
      budget-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${BUDGET_DB_USER:-budget_service_user}:${BUDGET_DB_PASSWORD:-budget_service_password}@budget-postgres:5432/${BUDGET_DB_NAME:-budget_service_db}
      LISTEN_PORT: 6432
      AUTH_TYPE: plain
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 5
      SERVER_RESET_QUERY: DISCARD ALL
      ADMIN_USERS: ${BUDGET_DB_USER:-budget_service_user}
      STATS_USERS: ${BUDGET_DB_USER:-budget_service_user}
    ports:
      - "6433:6432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${BUDGET_DB_USER:-budget_service_user} -d ${BUDGET_DB_NAME:-budget_service_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  budget-service:
    build:
      context: ../services/budget-service
    container_name: budget-service
    restart: unless-stopped
    depends_on:
      budget-pgbouncer:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    environment:
      APP_ENV: ${BUDGET_APP_ENV:-production}
      HTTP_ADDR: :8001
      BUDGET_GRPC_ADDR: :50051
      AUTH_SERVICE_URL: http://auth-service:8000
      TRANSACTION_GRPC_ADDR: transaction-service:50052
      DATABASE_URL: postgres://${BUDGET_DB_USER:-budget_service_user}:${BUDGET_DB_PASSWORD:-budget_service_password}@budget-pgbouncer:6432/${BUDGET_DB_NAME:-budget_service_db}?sslmode=disable
      DATABASE_MAX_OPEN_CONNS: ${BUDGET_DATABASE_MAX_OPEN_CONNS:-10}
      DATABASE_MAX_IDLE_CONNS: ${BUDGET_DATABASE_MAX_IDLE_CONNS:-5}
      DATABASE_CONN_MAX_LIFETIME_SECONDS: ${BUDGET_DATABASE_CONN_MAX_LIFETIME_SECONDS:-300}
    ports:
      - "8001:8001"
      - "50051:50051"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8001/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  report-postgres:
    <<: *postgres-common
    container_name: report-postgres
    environment:
      POSTGRES_DB: ${REPORT_DB_NAME:-report_service_db}
      POSTGRES_USER: ${REPORT_DB_USER:-report_service_user}
      POSTGRES_PASSWORD: ${REPORT_DB_PASSWORD:-report_service_password}
    volumes:
      - report-postgres-data:/var/lib/postgresql/data

  report-pgbouncer:
    <<: *pgbouncer-common
    container_name: report-pgbouncer
    depends_on:
      report-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${REPORT_DB_USER:-report_service_user}:${REPORT_DB_PASSWORD:-report_service_password}@report-postgres:5432/${REPORT_DB_NAME:-report_service_db}
      LISTEN_PORT: 6432
      AUTH_TYPE: plain
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 5
      SERVER_RESET_QUERY: DISCARD ALL
      ADMIN_USERS: ${REPORT_DB_USER:-report_service_user}
      STATS_USERS: ${REPORT_DB_USER:-report_service_user}
    ports:
      - "6434:6432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${REPORT_DB_USER:-report_service_user} -d ${REPORT_DB_NAME:-report_service_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  report-service:
    build:
      context: ../services/report-service
    container_name: report-service
    restart: unless-stopped
    depends_on:
      report-pgbouncer:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    environment:
      APP_NAME: ${REPORT_APP_NAME:-report-service}
      APP_ENV: ${REPORT_APP_ENV:-production}
      HOST: 0.0.0.0
      PORT: 8003
      AUTH_SERVICE_URL: http://auth-service:8000
      HTTP_TIMEOUT_SECONDS: ${REPORT_HTTP_TIMEOUT_SECONDS:-5}
      DATABASE_URL: postgresql+asyncpg://${REPORT_DB_USER:-report_service_user}:${REPORT_DB_PASSWORD:-report_service_password}@report-pgbouncer:6432/${REPORT_DB_NAME:-report_service_db}?prepared_statement_cache_size=0
      DATABASE_ECHO: ${REPORT_DATABASE_ECHO:-False}
      DATABASE_POOL_SIZE: ${REPORT_DATABASE_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${REPORT_DATABASE_MAX_OVERFLOW:-10}
    ports:
      - "8003:8003"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8003), 3); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  transaction-postgres:
    <<: *postgres-common
    container_name: transaction-postgres
    environment:
      POSTGRES_DB: ${TRANSACTION_DB_NAME:-transaction_service_db}
      POSTGRES_USER: ${TRANSACTION_DB_USER:-transaction_service_user}
      POSTGRES_PASSWORD: ${TRANSACTION_DB_PASSWORD:-transaction_service_password}
    volumes:
      - transaction-postgres-data:/var/lib/postgresql/data

  transaction-pgbouncer:
    <<: *pgbouncer-common
    container_name: transaction-pgbouncer
    depends_on:
      transaction-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${TRANSACTION_DB_USER:-transaction_service_user}:${TRANSACTION_DB_PASSWORD:-transaction_service_password}@transaction-postgres:5432/${TRANSACTION_DB_NAME:-transaction_service_db}
      LISTEN_PORT: 6432
      AUTH_TYPE: plain
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 5
      SERVER_RESET_QUERY: DISCARD ALL
      ADMIN_USERS: ${TRANSACTION_DB_USER:-transaction_service_user}
      STATS_USERS: ${TRANSACTION_DB_USER:-transaction_service_user}
    ports:
      - "6435:6432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${TRANSACTION_DB_USER:-transaction_service_user} -d ${TRANSACTION_DB_NAME:-transaction_service_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  transaction-minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: transaction-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${TRANSACTION_STORAGE_ACCESS_KEY:-transaction_service_access_key}
      MINIO_ROOT_PASSWORD: ${TRANSACTION_STORAGE_SECRET_KEY:-transaction_service_secret_key}
    volumes:
      - transaction-minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  transaction-minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: transaction-minio-init
    depends_on:
      transaction-minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${TRANSACTION_STORAGE_ACCESS_KEY:-transaction_service_access_key}
      MINIO_ROOT_PASSWORD: ${TRANSACTION_STORAGE_SECRET_KEY:-transaction_service_secret_key}
      TRANSACTION_STORAGE_BUCKET_NAME: ${TRANSACTION_STORAGE_BUCKET_NAME:-transaction-attachments}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set transaction-minio http://transaction-minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "transaction-minio/$$TRANSACTION_STORAGE_BUCKET_NAME"
    networks:
      - backend

  transaction-service:
    build:
      context: ../services/transaction-service
    container_name: transaction-service
    restart: unless-stopped
    depends_on:
      transaction-pgbouncer:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      transaction-minio-init:
        condition: service_completed_successfully
    environment:
      APP_NAME: ${TRANSACTION_APP_NAME:-transaction-service}
      APP_ENV: ${TRANSACTION_APP_ENV:-production}
      HOST: 0.0.0.0
      PORT: 8002
      AUTH_SERVICE_URL: http://auth-service:8000
      HTTP_TIMEOUT_SECONDS: ${TRANSACTION_HTTP_TIMEOUT_SECONDS:-5}
      DATABASE_URL: postgresql+asyncpg://${TRANSACTION_DB_USER:-transaction_service_user}:${TRANSACTION_DB_PASSWORD:-transaction_service_password}@transaction-pgbouncer:6432/${TRANSACTION_DB_NAME:-transaction_service_db}?prepared_statement_cache_size=0
      DATABASE_ECHO: ${TRANSACTION_DATABASE_ECHO:-False}
      DATABASE_POOL_SIZE: ${TRANSACTION_DATABASE_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${TRANSACTION_DATABASE_MAX_OVERFLOW:-10}
      STORAGE_ENDPOINT_URL: http://transaction-minio:9000
      STORAGE_REGION: ${TRANSACTION_STORAGE_REGION:-us-east-1}
      STORAGE_ACCESS_KEY: ${TRANSACTION_STORAGE_ACCESS_KEY:-transaction_service_access_key}
      STORAGE_SECRET_KEY: ${TRANSACTION_STORAGE_SECRET_KEY:-transaction_service_secret_key}
      STORAGE_BUCKET_NAME: ${TRANSACTION_STORAGE_BUCKET_NAME:-transaction-attachments}
      STORAGE_PUBLIC_BASE_URL: ${TRANSACTION_STORAGE_PUBLIC_BASE_URL:-http://127.0.0.1:9000}
      STORAGE_PATH_PREFIX: ${TRANSACTION_STORAGE_PATH_PREFIX:-attachments}
    ports:
      - "8002:8002"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8002), 3); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  backend:
    driver: bridge

volumes:
  auth-postgres-data:
  budget-postgres-data:
  report-postgres-data:
  transaction-postgres-data:
  transaction-minio-data:
