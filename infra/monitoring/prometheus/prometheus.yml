global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - gateway:2019
        labels:
          service: gateway

  - job_name: app-auth
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth-service:8000
          - auth-service-blue:8000
          - auth-service-green:8000
        labels:
          service: auth-service
          tier: application

  - job_name: app-budget
    metrics_path: /metrics
    static_configs:
      - targets:
          - budget-service:8001
          - budget-service-blue:8001
          - budget-service-green:8001
        labels:
          service: budget-service
          tier: application

  - job_name: app-report
    metrics_path: /metrics
    static_configs:
      - targets:
          - report-service:8003
          - report-service-blue:8003
          - report-service-green:8003
        labels:
          service: report-service
          tier: application

  - job_name: app-transaction
    metrics_path: /metrics
    static_configs:
      - targets:
          - transaction-service:8002
          - transaction-service-blue:8002
          - transaction-service-green:8002
        labels:
          service: transaction-service
          tier: application

  - job_name: postgres
    static_configs:
      - targets:
          - auth-postgres-exporter:9187
        labels:
          service: auth-service
          datastore: postgres
      - targets:
          - budget-postgres-exporter:9187
        labels:
          service: budget-service
          datastore: postgres
      - targets:
          - report-postgres-exporter:9187
        labels:
          service: report-service
          datastore: postgres
      - targets:
          - transaction-postgres-exporter:9187
        labels:
          service: transaction-service
          datastore: postgres

  - job_name: pgbouncer
    static_configs:
      - targets:
          - auth-pgbouncer-exporter:9127
        labels:
          service: auth-service
          datastore: pgbouncer
      - targets:
          - budget-pgbouncer-exporter:9127
        labels:
          service: budget-service
          datastore: pgbouncer
      - targets:
          - report-pgbouncer-exporter:9127
        labels:
          service: report-service
          datastore: pgbouncer
      - targets:
          - transaction-pgbouncer-exporter:9127
        labels:
          service: transaction-service
          datastore: pgbouncer

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          service: redis
          datastore: redis

  - job_name: rabbitmq
    static_configs:
      - targets:
          - rabbitmq:15692
        labels:
          service: rabbitmq
          datastore: queue

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets:
          - transaction-minio:9000
        labels:
          service: transaction-service
          datastore: object-storage

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
        labels:
          service: cadvisor
          tier: infrastructure

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          service: ec2-host
          tier: infrastructure
